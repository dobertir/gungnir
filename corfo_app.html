            <Pie data={data} dataKey={valKey} nameKey={catKey} cx="50%" cy="50%" outerRadius={90} innerRadius={42} paddingAngle={2}
              onClick={handlePieClick} style={cursorStyle}>
              {data.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]}/>)}
            </Pie>
            <Tooltip content={<DarkTooltip/>}/>
            <Legend wrapperStyle={{ fontSize:11, color:'var(--ink-400)' }} formatter={v => String(v).length > 28 ? String(v).slice(0,26)+'…' : v}/>
          </PieChart>
        </ResponsiveContainer>
      </div>
    );
  }
  // default: bar
  const valKey = numKeys[0];
  const isLong = data.length > 6 || (data.some(d => String(d[catKey]).length > 14));
  if (isLong) {
    return (
      <div style={{ marginTop: 20 }}>
        <ResponsiveContainer width="100%" height={Math.max(h, data.length * 30 + 40)}>
          <BarChart data={data} layout="vertical" margin={{ top:0, right:20, left: Math.min(data.reduce((m,d) => Math.max(m, String(d[catKey]).length),0)*7, 240), bottom:0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--ink-100)"/>
            <XAxis type="number" tick={{ fill:'var(--ink-400)', fontSize:10 }} axisLine={{ stroke:'var(--ink-200)' }}/>
            <YAxis type="category" dataKey={catKey} tick={{ fill:'var(--ink-400)', fontSize:10 }} axisLine={{ stroke:'var(--ink-200)' }} tickFormatter={v => String(v).length > 26 ? String(v).slice(0,24)+'…' : v}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Bar dataKey={valKey} fill="var(--data-1)" radius={[0,4,4,0]} name={valKey} onClick={handleBarClick} style={cursorStyle}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
    );
  }
  return (
    <div style={{ marginTop: 20 }}>
      <ResponsiveContainer width="100%" height={h}>
        <BarChart data={data} margin={{ top:5, right:20, left:10, bottom:5 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="var(--ink-100)"/>
          <XAxis dataKey={catKey} tick={{ fill:'var(--ink-400)', fontSize:11 }} axisLine={{ stroke:'var(--ink-200)' }} tickFormatter={v => String(v).length > 14 ? String(v).slice(0,12)+'…' : v}/>
          <YAxis tick={{ fill:'var(--ink-400)', fontSize:11 }} axisLine={{ stroke:'var(--ink-200)' }}/>
          <Tooltip content={<DarkTooltip/>}/>
          <Bar dataKey={valKey} fill="var(--data-1)" radius={[4,4,0,0]} name={valKey} onClick={handleBarClick} style={cursorStyle}/>
        </BarChart>
      </ResponsiveContainer>
    </div>
  );
}

// ─── RESULTS TABLE with sort / filter / group-by ───
function ResultsTable({ dataframe, addedLeads, addingLead, onAddLead, onVerPerfil, onVerProyecto }) {
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [filterText, setFilterText] = useState('');
  const [groupBy, setGroupBy] = useState(null);
  // Track which groups are expanded (by group value string)
  const [expanded, setExpanded] = useState(new Set());

  // Reset controls whenever dataframe changes (new query result)
  useEffect(() => {
    setSortCol(null);
    setSortDir('asc');
    setFilterText('');
    setGroupBy(null);
    setExpanded(new Set());
  }, [dataframe]);

  if (!dataframe || dataframe.length === 0) return null;

  const rawCols = Object.keys(dataframe[0]);
  const COMPANY_COLS = ['razon', 'empresa', 'razon_social'];
  const razonKey = COMPANY_COLS.find(c => c in dataframe[0]) || null;

  // Detectar si el resultado tiene columnas de proyecto individual
  const hasCodigoCol = 'codigo' in dataframe[0];
  const hasTituloCol = 'titulo_del_proyecto' in dataframe[0];
  const showVerProyecto = onVerProyecto && (hasCodigoCol || hasTituloCol);

  // Reorder columns: project queries → titulo first; company queries → razon first
  const PROJECT_FIRST = ['titulo_del_proyecto', 'objetivo_general_del_proyecto'];
  const isProjectResult = PROJECT_FIRST.some(c => c in dataframe[0]);
  const cols = (() => {
    const prioritized = isProjectResult
      ? [...PROJECT_FIRST.filter(c => c in dataframe[0]), ...rawCols.filter(c => !PROJECT_FIRST.includes(c))]
      : razonKey
        ? [razonKey, ...rawCols.filter(c => c !== razonKey)]
        : rawCols;
    return prioritized;
  })();

  // Determine if a column is numeric (check first non-null value)
  const isNumericCol = (col) => {
    for (const row of dataframe) {
      const v = row[col];
      if (v != null && v !== '') {
        return !isNaN(parseFloat(String(v)));
      }
    }
    return false;
  };

  // Compare two values for sorting
  const compareVals = (a, b, col) => {
    const numeric = isNumericCol(col);
    const aNull = a == null || a === '';
    const bNull = b == null || b === '';
    if (aNull && bNull) return 0;
    if (aNull) return 1;  // nulls go last
    if (bNull) return -1;
    if (numeric) {
      const af = parseFloat(String(a));
      const bf = parseFloat(String(b));
      if (!isNaN(af) && !isNaN(bf)) return af - bf;
    }
    return String(a).localeCompare(String(b), 'es');
  };

  // Handle header click for sorting
  const handleHeaderClick = (col) => {
    if (sortCol === col) {
      setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    } else {
      setSortCol(col);
      setSortDir('asc');
    }
  };

  // 1. Filter
  const lowerFilter = filterText.toLowerCase();
  const filtered = filterText.trim()
    ? dataframe.filter(row =>
        cols.some(c => row[c] != null && String(row[c]).toLowerCase().includes(lowerFilter))
      )
    : dataframe;

  // 2. Sort
  const sorted = sortCol
    ? [...filtered].sort((a, b) => {
        const cmp = compareVals(a[sortCol], b[sortCol], sortCol);
        return sortDir === 'asc' ? cmp : -cmp;
      })
    : filtered;

  const totalRows = dataframe.length;
  const visibleRows = filtered.length;

  // Toggle group expansion
  const toggleGroup = (val) => {
    setExpanded(prev => {
      const next = new Set(prev);
      if (next.has(val)) next.delete(val); else next.add(val);
      return next;
    });
  };

  // Currency formatter for aprobado_corfo sums
  const hasMonto = cols.includes('aprobado_corfo');

  // ── Render flat table (no group-by) ──────────────────────
  const renderFlatTable = () => (
    <table>
      <thead>
        <tr>
          {cols.map(c => {
            const isActive = sortCol === c;
            return (
              <th
                key={c}
                className={`sortable${isActive ? ' sort-active' : ''}`}
                onClick={() => handleHeaderClick(c)}
              >
                {c}
                <span className="sort-arrow">
                  {isActive ? (sortDir === 'asc' ? '▲' : '▼') : '⇅'}
                </span>
              </th>
            );
          })}
          {(razonKey || showVerProyecto) && <th>Acción</th>}
        </tr>
      </thead>
      <tbody>
        {sorted.length === 0 ? (
          <tr>
            <td colSpan={cols.length + (razonKey || showVerProyecto ? 1 : 0)} style={{ textAlign:'center', padding:'32px 0', color:'var(--text-muted)' }}>
              Sin resultados para esta busqueda
            </td>
          </tr>
        ) : sorted.map((row, i) => {
          const companyName = razonKey ? row[razonKey] : null;
          return (
            <tr key={i}>
              {cols.map((k, j) => {
                const v = row[k];
                let display;
                if (v == null) display = '—';
                else if (k === 'aprobado_corfo') display = fmtClp(Number(v));
                else if (typeof v === 'number' && v > 99999) display = fmtClp(v);
                else display = String(v);
                return <td key={j} title={v != null ? String(v) : ''}>{display}</td>;
              })}
              {(razonKey || showVerProyecto) && (
                <td style={{ whiteSpace: 'nowrap' }}>
                  {showVerProyecto && (
                    <button className="ver-perfil-link" onClick={() => onVerProyecto({ codigo: row.codigo, titulo: row.titulo_del_proyecto })}>
                      Ver proyecto
                    </button>
                  )}
                  {companyName && companyName !== 'Persona Natural' && onVerPerfil && (
                    <button className="ver-perfil-link" onClick={() => onVerPerfil(companyName)} style={{ marginLeft: showVerProyecto ? 4 : 0 }}>
                      Ver perfil
                    </button>
                  )}
                  {companyName && onAddLead && (
                    <button
                      className="btn btn-ghost btn-sm"
                      disabled={!!addingLead || addedLeads.has(companyName) || companyName === 'Persona Natural'}
                      onClick={() => onAddLead(companyName)}
                      style={{ whiteSpace:'nowrap', marginLeft: (companyName !== 'Persona Natural' || showVerProyecto) ? 4 : 0 }}
                    >
                      {addedLeads.has(companyName) ? '✓ En leads' : addingLead === companyName ? '…' : '+ Leads'}
                    </button>
                  )}
                </td>
              )}
            </tr>
          );
        })}
      </tbody>
    </table>
  );

  // ── Render grouped table ─────────────────────────────────
  const renderGroupedTable = () => {
    // Build groups from sorted (already filtered) rows
    const groupMap = new Map();
    for (const row of sorted) {
      const key = row[groupBy] != null ? String(row[groupBy]) : '(sin valor)';
      if (!groupMap.has(key)) groupMap.set(key, []);
      groupMap.get(key).push(row);
    }
    const groups = Array.from(groupMap.entries());

    if (groups.length === 0) {
      return (
        <table>
          <tbody>
            <tr>
              <td style={{ textAlign:'center', padding:'32px 0', color:'var(--text-muted)' }}>
                Sin resultados para esta busqueda
              </td>
            </tr>
          </tbody>
        </table>
      );
    }

    const colSpan = cols.length + (razonKey ? 1 : 0);

    return (
      <table>
        <thead>
          <tr>
            {cols.map(c => {
              const isActive = sortCol === c;
              return (
                <th
                  key={c}
                  className={`sortable${isActive ? ' sort-active' : ''}`}
                  onClick={() => handleHeaderClick(c)}
                >
                  {c}
                  <span className="sort-arrow">
                    {isActive ? (sortDir === 'asc' ? '▲' : '▼') : '⇅'}
                  </span>
                </th>
              );
            })}
            {razonKey && <th>Acción</th>}
          </tr>
        </thead>
        <tbody>
          {groups.map(([groupVal, rows]) => {
            const isOpen = expanded.has(groupVal);
            // Compute sum of aprobado_corfo for this group
            let sumaStr = '';
            if (hasMonto) {
              const suma = rows.reduce((acc, r) => {
                const v = parseFloat(String(r['aprobado_corfo'] ?? 0));
                return acc + (isNaN(v) ? 0 : v);
              }, 0);
              sumaStr = ` · ${fmtClp(suma)}`;
            }
            return (
              <React.Fragment key={groupVal}>
                <tr className="group-row" onClick={() => toggleGroup(groupVal)}>
                  <td colSpan={colSpan}>
                    <span className="group-toggle">{isOpen ? '▼' : '▶'}</span>
                    {groupVal}
                    <span style={{ marginLeft:10, fontWeight:400, color:'var(--text-muted)', fontSize:11 }}>
                      {rows.length} {rows.length === 1 ? 'fila' : 'filas'}{sumaStr}
                    </span>
                  </td>
                </tr>
                {isOpen && rows.map((row, i) => {
                  const companyName = razonKey ? row[razonKey] : null;
                  return (
                    <tr key={`${groupVal}-${i}`}>
                      {cols.map((k, j) => {
                        const v = row[k];
                        let display;
                        if (v == null) display = '—';
                        else if (k === 'aprobado_corfo') display = fmtClp(Number(v));
                        else if (typeof v === 'number' && v > 99999) display = fmtClp(v);
                        else display = String(v);
                        return <td key={j} title={v != null ? String(v) : ''}>{display}</td>;
                      })}
                      {razonKey && (
                        <td style={{ whiteSpace: 'nowrap' }}>
                          {companyName && companyName !== 'Persona Natural' && onVerPerfil && (
                            <button className="ver-perfil-link" onClick={() => onVerPerfil(companyName)}>
                              Ver perfil
                            </button>
                          )}
                          {companyName && onAddLead && (
                            <button
                              className="btn btn-ghost btn-sm"
                              disabled={!!addingLead || addedLeads.has(companyName) || companyName === 'Persona Natural'}
                              onClick={() => onAddLead(companyName)}
                              style={{ whiteSpace:'nowrap', marginLeft: companyName !== 'Persona Natural' ? 4 : 0 }}
                            >
                              {addedLeads.has(companyName) ? '✓ En leads' : addingLead === companyName ? '…' : '+ Leads'}
                            </button>
                          )}
                        </td>
                      )}
                    </tr>
                  );
                })}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    );
  };

  return (
    <div>
      {/* Controls toolbar */}
      {totalRows > 1 && (
      <div className="results-controls">
        <input
          className="filter-input"
          type="text"
          placeholder="Buscar en resultados..."
          value={filterText}
          onChange={e => setFilterText(e.target.value)}
        />
        <select
          className="group-sel"
          value={groupBy || ''}
          onChange={e => { setGroupBy(e.target.value || null); setExpanded(new Set()); }}
        >
          <option value="">Agrupar por: (ninguno)</option>
          {cols.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <span className="row-count">
          Mostrando {visibleRows} de {totalRows} filas
        </span>
      </div>
      )}

      {/* Table */}
      <div className="table-wrap">
        {groupBy ? renderGroupedTable() : renderFlatTable()}
      </div>
    </div>
  );
}

// ─── QUERY HISTORY HOOK ────────────────────
// Persists a list of NL query strings in localStorage, keyed per user.
// Max 20 entries; no consecutive duplicates; most-recent first.
function useQueryHistory(username) {
  const storageKey = username ? `corfo_query_history_${username}` : null;
  const MAX_ENTRIES = 20;

  const [history, setHistory] = useState(() => {
    if (!storageKey) return [];
    try {
      const raw = localStorage.getItem(storageKey);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  });

  // Persist whenever history changes
  useEffect(() => {
    if (!storageKey) return;
    try {
      localStorage.setItem(storageKey, JSON.stringify(history));
    } catch {
      // ignore quota errors
    }
  }, [history, storageKey]);

  const addToHistory = useCallback((question) => {
    const trimmed = question.trim();
    if (!trimmed) return;
    setHistory(prev => {
      // Skip if same as most-recent entry (consecutive dedup)
      if (prev.length > 0 && prev[0] === trimmed) return prev;
      const next = [trimmed, ...prev.filter(q => q !== trimmed)];
      return next.slice(0, MAX_ENTRIES);
    });
  }, []);

  const clearHistory = useCallback(() => {
    setHistory([]);
  }, []);

  return { history, addToHistory, clearHistory };
}

// ─── CONSULTAS TAB ─────────────────────────
function Consultas({ onQueryResult, onLeadAdded, isAdmin, pendingQuery, onClearPendingQuery, username }) {
  const [q, setQ] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null); // { answer, dataframe, chart_type, sql }
  const [toast, setToast] = useState(null);
  const [addedLeads, setAddedLeads] = useState(new Set());
  const [addingLead, setAddingLead] = useState(null);
  // Badge que indica que la consulta vino del Dashboard
  const [dashboardOrigin, setDashboardOrigin] = useState(null); // string | null
  const inputRef = useRef();
  // Drill-down state for query-result charts
  const [drillModal, setDrillModal] = useState(null); // { rows, title } | null
  // Empresa perfil modal
  const [empresaModal, setEmpresaModal] = useState(null); // { razon } | null
  // SQL block UI state
  const [sqlExpanded, setSqlExpanded] = useState(false);
  const [sqlEditing, setSqlEditing] = useState(false);
  const [sqlDraft, setSqlDraft] = useState('');
  const [sqlError, setSqlError] = useState('');
  const [reRunning, setReRunning] = useState(false);

  const openEmpresaPerfil = (razon) => setEmpresaModal({ razon });

  const [proyectoPanel, setProyectoPanel] = useState(null); // { codigo, titulo } | null
  const openProyecto = useCallback(({codigo, titulo}) => setProyectoPanel({codigo, titulo}), []);

  // Referencia estable a submit para evitar dependencias circulares en useEffect
  const submitRef = useRef(null);

  // Historial de consultas persistente en localStorage (por usuario)
  const { history: queryHistory, addToHistory, clearHistory } = useQueryHistory(username);
  // Estado de visibilidad del panel de historial (colapsado por defecto)
  const [historialOpen, setHistorialOpen] = useState(false);

  // Historial conversacional: array de { question, answer, result_summary }
  const [conversationHistory, setConversationHistory] = useState([]);
  const MAX_HISTORY = 3;

  // DOB-203: modo de contexto — false = nueva consulta (default), true = seguir preguntando
  const [continueContext, setContinueContext] = useState(false);

  const clearConversation = () => {
    setConversationHistory([]);
    setQ('');
    setContinueContext(false);
  };

  // DOB-204: pre-filtros de alcance
  const YEAR_MIN = 2009;
  const YEAR_MAX = 2025;
  const [scopeFilters, setScopeFilters] = useState({ yearFrom: YEAR_MIN, yearTo: YEAR_MAX, region: '', activeOnly: false });
  const [filterOptions, setFilterOptions] = useState({ regiones: [] });
  const [filtersOpen, setFiltersOpen] = useState(false);

  useEffect(() => {
    fetch('/api/dashboard/filter-options')
      .then(r => r.json())
      .then(d => setFilterOptions({ regiones: d.regiones || [] }))
      .catch(() => {});
  }, []);

  const yearFiltered = scopeFilters.yearFrom > YEAR_MIN || scopeFilters.yearTo < YEAR_MAX;
  const activeFilterCount = [yearFiltered, scopeFilters.region, scopeFilters.activeOnly].filter(Boolean).length;

  const buildFilterContext = () => {
    const parts = [];
    if (yearFiltered) {
      if (scopeFilters.yearFrom === scopeFilters.yearTo) {
        parts.push(`año de adjudicación ${scopeFilters.yearFrom}`);
      } else {
        parts.push(`años de adjudicación entre ${scopeFilters.yearFrom} y ${scopeFilters.yearTo}`);
      }
    }
    if (scopeFilters.region) parts.push(`región ${scopeFilters.region}`);
    if (scopeFilters.activeOnly) parts.push('solo proyectos activos (vigentes)');
    return parts.length ? `[Contexto de búsqueda: ${parts.join(', ')}] ` : '';
  };

  const isChartable = (data, chartType) => {
    if (!data?.length || !chartType) return false;
    const keys = Object.keys(data[0]);
    return keys.slice(1).some(k => typeof data[0][k] === 'number');
  };

  const handleQueryChartClick = (catKey, value) => {
    if (!result?.dataframe?.length) return;
    // Filter dataframe rows where the clicked dimension matches
    const filtered = result.dataframe.filter(row => {
      const v = row[catKey];
      return v != null && String(v) === value;
    });
    setDrillModal({ rows: filtered, title: `Proyectos: ${value}` });
  };

  const examples = [
    '¿Cuántos proyectos se aprobaron en 2020?',
    '¿Cuáles son las empresas con mayor financiamiento?',
    'Muestra proyectos de economía circular por región',
    '¿Qué regiones tienen más proyectos aprobados?',
    'Lista proyectos dirigidos por mujeres',
    '¿Cuál es el monto promedio por tipo de innovación?',
    'Proyectos de acuicultura por año',
    '¿Cuántas empresas tienen más de 5 proyectos?'
  ];

  const addToLeads = async (razon) => {
    setAddingLead(razon);
    try {
      const r = await fetch('/api/leads', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ nombre_compania: razon })
      });
      const d = await r.json();
      if (r.status === 201) {
        setAddedLeads(prev => new Set([...prev, razon]));
        setToast(`"${razon}" agregado a leads`);
        if (onLeadAdded) onLeadAdded();
      } else if (r.status === 409) {
        setAddedLeads(prev => new Set([...prev, razon]));
        setToast(`"${razon}" ya estaba en leads`);
        if (onLeadAdded) onLeadAdded();
      } else {
        setToast(d.error || 'Error al agregar');
      }
    } catch(e) { setToast('Error de conexión'); }
    setAddingLead(null);
  };

  // Aplica el resultado recibido del servidor y actualiza estado compartido
  const applyResult = (d, questionText) => {
    setResult(d);
    setSqlExpanded(false);
    setSqlEditing(false);
    setSqlDraft(d.sql || '');
    setSqlError('');
    if (d.dataframe?.length) {
      const COMPANY_COLS = ['razon', 'empresa', 'razon_social'];
      const razonKey = COMPANY_COLS.find(c => c in d.dataframe[0]);
      if (razonKey) {
        const razones = [...new Set(d.dataframe.map(r => r[razonKey]).filter(Boolean))];
        fetch('/api/leads').then(r => r.json()).then(leads => {
          const existing = new Set(leads.map(l => l.nombre_compania).filter(Boolean));
          setAddedLeads(new Set(razones.filter(r => existing.has(r))));
        }).catch(() => {});
      }
    }
    if (onQueryResult && d.dataframe) {
      onQueryResult({ question: questionText, ...d });
    }
    // Append turn to conversation history only when in "seguir preguntando" mode
    if (continueContext && questionText && d.answer && !d.error) {
      const firstRow = d.dataframe?.[0];
      const resultSummary = firstRow
        ? Object.entries(firstRow).slice(0, 4).map(([k, v]) => `${k}=${v}`).join(', ')
        : '';
      setConversationHistory(prev => [
        ...prev.slice(-(MAX_HISTORY - 1)),
        { question: questionText, answer: d.answer, result_summary: resultSummary }
      ]);
    }
  };

  // Submit puede recibir una pregunta explícita (ej: desde Dashboard) o usar el valor actual de q
  const submit = async (overrideQuestion) => {
    const rawQuestion = overrideQuestion !== undefined ? overrideQuestion : q;
    if (!rawQuestion.trim() || loading) return;
    // Prepend filter context if any filters are active
    const filterCtx = buildFilterContext();
    const question = filterCtx ? filterCtx + rawQuestion : rawQuestion;
    setLoading(true); setResult(null); setAddedLeads(new Set());
    try {
      const body = { question };
      if (continueContext && conversationHistory.length > 0) body.history = conversationHistory;
      const r = await fetch('/api/query', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const d = await r.json();
      applyResult(d, rawQuestion);
      if (!d.error) {
        addToHistory(rawQuestion);
      }
    } catch(e) { setResult({ answer: 'Error de conexión con el servidor.', dataframe: [] }); }
    setLoading(false);
  };

  // Keep submitRef in sync so the pendingQuery effect always calls the latest version
  submitRef.current = submit;

  // Detectar consulta entrante desde el Dashboard y auto-ejecutarla
  useEffect(() => {
    if (!pendingQuery) return;
    const { question, origin } = pendingQuery;
    setQ(question);
    setDashboardOrigin(origin);
    if (onClearPendingQuery) onClearPendingQuery();
    // Ejecutar en el siguiente tick para que q esté ya en el DOM
    setTimeout(() => submitRef.current(question), 0);
  }, [pendingQuery]);

  // Re-ejecutar con el SQL editado manualmente
  const reRunSql = async () => {
    const trimmed = sqlDraft.trim();
    if (!trimmed) return;
    // Validación client-side: debe empezar con SELECT o WITH (CTEs)
    if (!/^(select|with)\b/i.test(trimmed)) {
      setSqlError('Solo se permiten consultas SELECT.');
      return;
    }
    setSqlError('');
    setReRunning(true);
    try {
      const r = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw_sql: trimmed }),
      });
      const d = await r.json();
      if (!r.ok) {
        setSqlError(d.error || `Error del servidor (${r.status})`);
      } else {
        // Preservar el SQL editado como sql en el resultado
        if (!d.sql) d.sql = trimmed;
        applyResult(d, d.answer || 'Query ejecutada directamente.');
        setSqlEditing(false);
        setSqlExpanded(true);
      }
    } catch(e) {
      setSqlError('Error de conexión con el servidor.');
    }
    setReRunning(false);
  };

  const exportExcel = async () => {
    if (!result?.dataframe?.length) return;
    setToast('Preparando archivo Excel…');
    try {
      const r = await fetch('/api/export/excel', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ data: result.dataframe, filename: 'consulta_corfo' })
      });
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'consulta_corfo.xlsx'; a.click();
      URL.revokeObjectURL(url);
      setToast('Excel descargado correctamente');
    } catch(e) { setToast('Error al exportar'); }
  };

  const exportCsv = async () => {
    if (!result?.dataframe?.length) return;
    setToast('Preparando archivo CSV…');
    try {
      const r = await fetch('/api/export/csv', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ data: result.dataframe, filename: 'consulta_corfo' })
      });
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'consulta_corfo.csv'; a.click();
      URL.revokeObjectURL(url);
      setToast('CSV descargado correctamente');
    } catch(e) { setToast('Error al exportar'); }
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">Consulta en lenguaje natural</div>
        <div style={{ padding: 'var(--s-4) var(--s-5) var(--s-5)' }}>
        {/* Badge informativo cuando la consulta viene del Dashboard */}
        {dashboardOrigin && (
          <div className="desde-dashboard-badge">
            Desde el Dashboard: <strong style={{ marginLeft: 4 }}>{dashboardOrigin}</strong>
            <button onClick={() => setDashboardOrigin(null)} title="Cerrar">&#x2715;</button>
          </div>
        )}
        {/* Fila de filtros de alcance (DOB-204) */}
        <div style={{ marginBottom: 'var(--s-3)', display: 'flex', alignItems: 'center', gap: 'var(--s-2)', flexWrap: 'wrap' }}>
          <button
            className="btn btn-secondary"
            style={{ fontSize: 11, padding: '3px 10px', display: 'flex', alignItems: 'center', gap: 4 }}
            onClick={() => setFiltersOpen(o => !o)}
          >
            <span>⚙ Filtros</span>
            {activeFilterCount > 0 && (
              <span style={{ background: 'var(--accent)', color: '#fff', borderRadius: 10, padding: '0 5px', fontSize: 10, fontWeight: 600 }}>{activeFilterCount}</span>
            )}
          </button>
          {/* Active filter chips */}
          {yearFiltered && (
            <span className="chip chip-navy" style={{ cursor: 'pointer' }} onClick={() => setScopeFilters(f => ({ ...f, yearFrom: YEAR_MIN, yearTo: YEAR_MAX }))}>
              {scopeFilters.yearFrom === scopeFilters.yearTo ? `Año ${scopeFilters.yearFrom}` : `${scopeFilters.yearFrom} – ${scopeFilters.yearTo}`} ✕
            </span>
          )}
          {scopeFilters.region && (
            <span className="chip chip-navy" style={{ cursor: 'pointer' }} onClick={() => setScopeFilters(f => ({ ...f, region: '' }))}>
              {scopeFilters.region} ✕
            </span>
          )}
          {scopeFilters.activeOnly && (
            <span className="chip chip-navy" style={{ cursor: 'pointer' }} onClick={() => setScopeFilters(f => ({ ...f, activeOnly: false }))}>
              Solo activos ✕
            </span>
          )}
        </div>
        {filtersOpen && (
          <div style={{ display: 'flex', gap: 'var(--s-5)', flexWrap: 'wrap', alignItems: 'flex-end', marginBottom: 'var(--s-3)', padding: 'var(--s-3) var(--s-4)', background: 'var(--paper)', border: '1px solid var(--ink-200)', borderRadius: 'var(--r-3)' }}>
            {/* Dual-handle year range slider */}
            {(() => {
              const pct = v => ((v - YEAR_MIN) / (YEAR_MAX - YEAR_MIN)) * 100;
              const fromPct = pct(scopeFilters.yearFrom);
              const toPct   = pct(scopeFilters.yearTo);
              return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, minWidth: 220 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                    <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink-500)', textTransform: 'uppercase', letterSpacing: '0.6px' }}>Período</label>
                    <span style={{ fontSize: 13, fontWeight: 600, color: yearFiltered ? 'var(--accent)' : 'var(--ink-400)', fontFamily: 'var(--font-mono)' }}>
                      {scopeFilters.yearFrom === scopeFilters.yearTo ? scopeFilters.yearFrom : `${scopeFilters.yearFrom} – ${scopeFilters.yearTo}`}
                    </span>
                  </div>
                  <div className="dual-range-wrap">
                    <div className="dual-range-track" style={{ width: '100%', background: 'var(--ink-200)' }} />
                    <div className="dual-range-track" style={{ left: `${fromPct}%`, right: `${100 - toPct}%`, background: 'var(--accent)' }} />
                    <input type="range" min={YEAR_MIN} max={YEAR_MAX} step={1}
                      value={scopeFilters.yearFrom}
                      onChange={e => { const v = Number(e.target.value); setScopeFilters(f => ({ ...f, yearFrom: Math.min(v, f.yearTo) })); }}
                    />
                    <input type="range" min={YEAR_MIN} max={YEAR_MAX} step={1}
                      value={scopeFilters.yearTo}
                      onChange={e => { const v = Number(e.target.value); setScopeFilters(f => ({ ...f, yearTo: Math.max(v, f.yearFrom) })); }}
                    />
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ fontSize: 10, color: 'var(--ink-400)', fontFamily: 'var(--font-mono)' }}>{YEAR_MIN}</span>
                    <span style={{ fontSize: 10, color: 'var(--ink-400)', fontFamily: 'var(--font-mono)' }}>{YEAR_MAX}</span>
                  </div>
                </div>
              );
            })()}
            {/* Region selector */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink-500)', textTransform: 'uppercase', letterSpacing: '0.6px' }}>Región</label>
              <select
                className="query-input"
                style={{ width: 220, padding: '4px 8px', fontSize: 13 }}
                value={scopeFilters.region}
                onChange={e => setScopeFilters(f => ({ ...f, region: e.target.value }))}
              >
                <option value="">Todas</option>
                {filterOptions.regiones.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            {/* Solo activos */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, justifyContent: 'flex-end' }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', fontSize: 13, color: 'var(--ink-700)' }}>
                <input
                  type="checkbox"
                  checked={scopeFilters.activeOnly}
                  onChange={e => setScopeFilters(f => ({ ...f, activeOnly: e.target.checked }))}
                  style={{ accentColor: 'var(--accent)' }}
                />
                Solo proyectos activos
              </label>
            </div>
            {activeFilterCount > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
                <button className="btn btn-secondary" style={{ fontSize: 11 }} onClick={() => setScopeFilters({ yearFrom: YEAR_MIN, yearTo: YEAR_MAX, region: '', activeOnly: false })}>
                  Limpiar filtros
                </button>
              </div>
            )}
          </div>
        )}
        <div className="query-row">
          <input ref={inputRef} className="query-input" value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==='Enter' && submit()} placeholder="Ej: ¿Cuál es el sector con mayor monto total aprobado?"/>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading ? 'Procesando…' : 'Consultar'}</button>
          {/* DOB-203: toggle modo conversacional */}
          <div style={{ display: 'flex', gap: 2, marginLeft: 8, border: '1px solid var(--ink-200)', borderRadius: 'var(--r-3)', overflow: 'hidden' }}>
            <button
              className="btn"
              style={{ fontSize: 11, padding: '4px 10px', borderRadius: 0, background: !continueContext ? 'var(--accent)' : 'transparent', color: !continueContext ? '#fff' : 'var(--ink-500)', border: 'none' }}
              onClick={() => { setContinueContext(false); setConversationHistory([]); }}
              title="Cada consulta es independiente (sin contexto previo)"
            >
              Nueva consulta
            </button>
            <button
              className="btn"
              style={{ fontSize: 11, padding: '4px 10px', borderRadius: 0, background: continueContext ? 'var(--accent)' : 'transparent', color: continueContext ? '#fff' : 'var(--ink-500)', border: 'none' }}
              onClick={() => setContinueContext(true)}
              title={`Continúa la conversación anterior${conversationHistory.length > 0 ? ` (${conversationHistory.length} turno${conversationHistory.length !== 1 ? 's' : ''})` : ''}`}
            >
              Seguir preguntando{continueContext && conversationHistory.length > 0 ? ` (${conversationHistory.length})` : ''}
            </button>
          </div>
        </div>
        <div className="pills">
          {examples.map((ex,i) => <div key={i} className="pill" onClick={() => { setQ(ex); setTimeout(() => submitRef.current(ex), 0); }}>{ex}</div>)}
        </div>
        </div>
      </div>

      {/* Historial de consultas recientes */}
      {queryHistory.length > 0 && (
        <div className="historial-block">
          <div className="historial-header" onClick={() => setHistorialOpen(o => !o)}>
            <span className="historial-label">
              Historial
              <span className="historial-count">{queryHistory.length}</span>
            </span>
            <span className={`historial-chevron${historialOpen ? ' open' : ''}`}>▼</span>
          </div>
          {historialOpen && (
            <div className="historial-body">
              <div className="historial-pills">
                {queryHistory.map((q_entry, i) => (
                  <button
                    key={i}
                    className="historial-pill"
                    title={q_entry}
                    onClick={() => {
                      setQ(q_entry);
                      setTimeout(() => submitRef.current(q_entry), 0);
                    }}
                  >
                    {q_entry}
                  </button>
                ))}
              </div>
              <div className="historial-footer">
                <button className="btn-limpiar-historial" onClick={clearHistory}>
                  Limpiar historial
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {loading && <div className="spinner"/>}

      {result && !loading && (
        <>
          {result.warning && (
            <div style={{ background:'#F5ECD9', border:'1px solid rgba(138,106,30,.25)', borderRadius:'var(--r-3)', padding:'var(--s-3) var(--s-4)', marginBottom:'var(--s-4)' }}>
              <p style={{ color:'var(--warn)', fontSize:'var(--fs-13)' }}>⚠ {result.warning}</p>
            </div>
          )}
          {result.answer && (
            <div className="answer-box">
              <div style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.9px', color:'var(--accent)', marginBottom:8 }}>Interpretación</div>
              {result.interpretacion && (
                <p style={{ fontSize:'var(--fs-12)', color:'var(--ink-400)', marginBottom:'var(--s-2)', fontStyle:'italic' }}>
                  {result.interpretacion}
                </p>
              )}
              <p>{result.answer}</p>
            </div>
          )}
          {result.sql && (
            <div className="sql-block">
              <div className="sql-block-header" onClick={() => { setSqlExpanded(e => !e); }}>
                <span className="sql-block-label">SQL generado</span>
                <span className={`sql-block-chevron${sqlExpanded ? ' open' : ''}`}>▼</span>
              </div>
              {sqlExpanded && (
                <div className="sql-block-body">
                  {!sqlEditing && (
                    <div className="sql-code">{result.sql}</div>
                  )}
                  {sqlEditing && (
                    <textarea
                      className="sql-edit-area"
                      value={sqlDraft}
                      onChange={e => { setSqlDraft(e.target.value); setSqlError(''); }}
                      spellCheck={false}
                      rows={5}
                    />
                  )}
                  <div className="sql-actions">
                    {!sqlEditing && (
                      <button className="btn btn-ghost btn-sm" onClick={() => { setSqlDraft(result.sql); setSqlEditing(true); setSqlError(''); }}>
                        ✏ Editar SQL
                      </button>
                    )}
                    {sqlEditing && (
                      <>
                        <button className="btn btn-accent btn-sm" onClick={reRunSql} disabled={reRunning}>
                          {reRunning ? 'Ejecutando…' : '▶ Re-ejecutar'}
                        </button>
                        <button className="btn btn-ghost btn-sm" onClick={() => { setSqlEditing(false); setSqlError(''); }}>
                          Cancelar
                        </button>
                      </>
                    )}
                    {sqlError && <span className="sql-inline-error">⚠ {sqlError}</span>}
                  </div>
                </div>
              )}
            </div>
          )}
          {result.dataframe?.length > 0 && (
            <div className="card" style={{ overflow: 'hidden' }}>
              <div className="table-toolbar" style={{ padding: 'var(--s-3) var(--s-4)', borderBottom: '1px solid var(--ink-200)', marginBottom: 0 }}>
                <span>{result.dataframe.length} {result.dataframe.length === 1 ? 'registro' : 'registros'}</span>
                <div style={{ display: 'flex', gap: 'var(--s-2)' }}>
                {isAdmin && <button className="btn btn-ghost btn-sm" onClick={exportExcel}>⬇ Exportar Excel</button>}
                {isAdmin && <button className="btn btn-ghost btn-sm" onClick={exportCsv}>⬇ Exportar CSV</button>}
                </div>
              </div>
              <div style={{ padding: 'var(--s-4) var(--s-4) var(--s-4)' }}>
              <AutoChart data={result.dataframe} chartType={result.chart_type} onSliceClick={handleQueryChartClick}/>
              <div style={{ marginTop: isChartable(result.dataframe, result.chart_type) ? 20 : 0 }}>
                <ResultsTable
                  dataframe={result.dataframe}
                  addedLeads={addedLeads}
                  addingLead={addingLead}
                  onAddLead={isAdmin ? addToLeads : null}
                  onVerPerfil={openEmpresaPerfil}
                  onVerProyecto={openProyecto}
                />
              </div>
              </div>
            </div>
          )}
          {result.dataframe?.length === 0 && result.answer && (
            <div className="empty"><p style={{ color:'var(--ink-400)' }}>No se encontraron resultados.</p></div>
          )}
        </>
      )}

      {toast && <Toast msg={toast} onDone={() => setToast(null)}/>}
      {drillModal && <DrillDownModal rows={drillModal.rows} title={drillModal.title} onClose={() => setDrillModal(null)} onVerPerfil={openEmpresaPerfil}/>}
      {empresaModal && <EmpresaPerfilModal razon={empresaModal.razon} onClose={() => setEmpresaModal(null)}/>}
      {proyectoPanel && <ProyectoDetallePanel codigo={proyectoPanel.codigo} titulo={proyectoPanel.titulo} onClose={() => setProyectoPanel(null)} onLeadAdded={() => { if (onLeadAdded) onLeadAdded(); }} isAdmin={isAdmin}/>}
    </div>
  );
}
