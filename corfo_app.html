const LEADS_STATUSES = ['Nuevo', 'Contactado', 'En seguimiento', 'Propuesta enviada', 'Cerrado'];

const STATUS_COLORS = {
  'Nuevo':              'badge-gray',
  'Contactado':         'badge-blue',
  'En seguimiento':     'badge-amber',
  'Propuesta enviada':  'badge-green',
  'Cerrado':            'badge-red',
};

/* Sub-component: panel lateral con proyectos CORFO de la empresa */
function LeadDetailPanel({ lead, isAdmin, onClose, onUpdate, onDelete }) {
  const [empresaData, setEmpresaData] = useState(null);
  const [loadingEmpresa, setLoadingEmpresa] = useState(false);
  const [errorEmpresa, setErrorEmpresa] = useState(null);
  const [contacto, setContacto] = useState(lead.contacto || '');
  const [status, setStatus] = useState(lead.status || 'Nuevo');
  const [saving, setSaving] = useState(false);

  // Sync local state when a different lead is selected
  useEffect(() => {
    setContacto(lead.contacto || '');
    setStatus(lead.status || 'Nuevo');
  }, [lead.id]);

  // Fetch company projects
  useEffect(() => {
    if (!lead.nombre_compania) return;
    setLoadingEmpresa(true);
    setErrorEmpresa(null);
    setEmpresaData(null);
    fetch(`/api/empresa/${encodeURIComponent(lead.nombre_compania)}`)
      .then(r => r.json())
      .then(d => { if (d.error) setErrorEmpresa(d.error); else setEmpresaData(d); })
      .catch(() => setErrorEmpresa('Error de conexión'))
      .finally(() => setLoadingEmpresa(false));
  }, [lead.nombre_compania]);

  const save = async (field, val) => {
    setSaving(true);
    try {
      await apiFetch(`/api/leads/${lead.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: val }),
      });
      onUpdate(lead.id, field, val);
    } catch(e) {
      console.error('save lead error:', e.message);
    } finally {
      setSaving(false);
    }
  };

  const confirmDelete = async () => {
    if (!confirm(`¿Eliminar "${lead.nombre_compania}" de los leads?`)) return;
    await apiFetch(`/api/leads/${lead.id}`, { method: 'DELETE' });
    onDelete(lead.id);
    onClose();
  };

  return (
    <div style={{
      position: 'sticky', top: 0,
      background: 'var(--surface)', border: '1px solid var(--border)',
      borderRadius: 12, padding: 20, minHeight: 400,
      display: 'flex', flexDirection: 'column', gap: 16,
    }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <h3 style={{ fontSize: 15, fontWeight: 600, margin: 0, wordBreak: 'break-word' }}>{lead.nombre_compania}</h3>
          <p style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>
            Agregado {lead.created_at ? lead.created_at.split('T')[0] : '—'}
          </p>
        </div>
        <button onClick={onClose} style={{
          background: 'none', border: 'none', color: 'var(--text-muted)',
          fontSize: 18, cursor: 'pointer', padding: '0 4px', lineHeight: 1,
        }}>×</button>
      </div>

      {/* Editable fields — only admin can modify */}
      <div className="field-group">
        <label>Contacto</label>
        {isAdmin ? (
          <input
            value={contacto}
            onChange={e => setContacto(e.target.value)}
            onBlur={() => save('contacto', contacto)}
            placeholder="Nombre del contacto…"
            disabled={saving}
          />
        ) : (
          <p style={{ fontSize: 13, color: contacto ? 'var(--text)' : 'var(--text-muted)', fontStyle: contacto ? 'normal' : 'italic', margin: '4px 0' }}>
            {contacto || 'Sin contacto'}
          </p>
        )}
      </div>
      <div className="field-group">
        <label>Status</label>
        {isAdmin ? (
          <select
            value={status}
            onChange={e => { setStatus(e.target.value); save('status', e.target.value); }}
            disabled={saving}
          >
            {LEADS_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        ) : (
          <span className={`badge ${STATUS_COLORS[status] || 'badge-gray'}`}>{status || 'Nuevo'}</span>
        )}
      </div>

      <hr style={{ border: 'none', borderTop: '1px solid var(--border)', margin: '4px 0' }}/>

      {/* Company projects from CORFO */}
      <div>
        <p style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
          Proyectos en CORFO
        </p>
        {loadingEmpresa && <div className="spinner" style={{ margin: '16px auto' }}/>}
        {errorEmpresa && (
          <p style={{ fontSize: 13, color: 'var(--text-muted)', fontStyle: 'italic' }}>
            {errorEmpresa === 'Empresa no encontrada'
              ? 'Esta empresa no tiene proyectos en la base de datos CORFO.'
              : errorEmpresa}
          </p>
        )}
        {empresaData && (
          <>
            <div style={{ display: 'flex', gap: 12, marginBottom: 12, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                <span style={{ fontSize: 18, fontWeight: 700, color: 'var(--text)', display: 'block' }}>{empresaData.total_proyectos}</span>
                proyectos
              </div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--green)', display: 'block' }}>{fmtClp(empresaData.monto_total)}</span>
                monto total
              </div>
              {empresaData.primer_año && (
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)', display: 'block' }}>{empresaData.primer_año}–{empresaData.ultimo_año}</span>
                  período
                </div>
              )}
            </div>
            <div style={{ maxHeight: 320, overflowY: 'auto' }}>
              {empresaData.proyectos.map((p, i) => (
                <div key={i} style={{
                  padding: '8px 0', borderBottom: '1px solid var(--border)',
                  fontSize: 12,
                }}>
                  <div style={{ fontWeight: 500, marginBottom: 2, color: 'var(--text)' }}>
                    {p.titulo_del_proyecto || '(sin título)'}
                  </div>
                  <div style={{ color: 'var(--text-muted)', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    <span>{p['año_adjudicacion'] || '—'}</span>
                    {p.instrumento && <span>· {p.instrumento}</span>}
                    {p.aprobado_corfo && <span>· {fmtClp(p.aprobado_corfo)}</span>}
                    {p.tendencia_final && <span>· {p.tendencia_final}</span>}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* Delete button — admin only */}
      {isAdmin && (
        <button
          className="btn btn-ghost btn-sm"
          style={{ marginTop: 'auto', color: 'var(--neg)', borderColor: 'rgba(155,61,46,.30)', width: '100%' }}
          onClick={confirmDelete}
        >
          Eliminar lead
        </button>
      )}
    </div>
  );
}

/* Modal para agregar un lead manualmente */
function AddLeadModal({ onClose, onAdded }) {
  const [nombre, setNombre] = useState('');
  const [contacto, setContacto] = useState('');
  const [status, setStatus] = useState('Nuevo');
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');

  const submit = async e => {
    e.preventDefault();
    if (!nombre.trim()) { setError('Ingresa el nombre de la empresa'); return; }
    setSaving(true);
    setError('');
    try {
      const r = await apiFetch('/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre_compania: nombre.trim(), contacto, status }),
      });
      const d = await r.json();
      if (r.status === 201) { onAdded(d); onClose(); }
      else if (r.status === 409) { setError('Esta empresa ya está en tus leads'); }
      else { setError(d.error || 'Error al agregar'); }
    } catch(e) { setError(e.status === 403 ? 'Sin permiso para agregar leads' : 'Error de conexión'); }
    finally { setSaving(false); }
  };

  return (
    <div className="drill-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background: 'var(--card)', border: '1px solid var(--ink-200)', borderRadius: 'var(--r-4)', padding: 'var(--s-6)',
        width: '100%', maxWidth: 420, margin: 'auto', boxShadow: 'var(--shadow-3)',
      }}>
        <h3 style={{ marginBottom: 20, fontSize: 16 }}>Agregar lead</h3>
        <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div className="field-group">
            <label>Nombre de empresa *</label>
            <input
              autoFocus value={nombre}
              onChange={e => setNombre(e.target.value)}
              placeholder="Ej: Empresa Alimentaria SpA"
            />
          </div>
          <div className="field-group">
            <label>Contacto</label>
            <input value={contacto} onChange={e => setContacto(e.target.value)} placeholder="Nombre del contacto (opcional)"/>
          </div>
          <div className="field-group">
            <label>Status inicial</label>
            <select value={status} onChange={e => setStatus(e.target.value)}>
              {LEADS_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          {error && <p style={{ color: 'var(--red)', fontSize: 13 }}>{error}</p>}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 4 }}>
            <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn-primary btn-sm" disabled={saving} style={{ justifyContent: 'center' }}>
              {saving ? 'Guardando…' : 'Agregar'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function Leads({ refreshKey, onLeadAdded, isAdmin }) {
  const [leads, setLeads] = useState([]);
  const [sel, setSel] = useState(null);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const r = await fetch('/api/leads');
      if (!r.ok) throw new Error(`Error HTTP ${r.status}`);
      const data = await r.json();
      setLeads(Array.isArray(data) ? data : []);
    } catch(e) {
      console.error(e);
      setError('Error al cargar los leads. Intenta nuevamente.');
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load, refreshKey]);

  const handleUpdate = (id, field, val) => {
    setLeads(prev => prev.map(l => l.id === id ? { ...l, [field]: val } : l));
    if (sel?.id === id) setSel(prev => ({ ...prev, [field]: val }));
    if (field === 'status') setToast(`Status actualizado: ${val}`);
  };

  const handleDelete = id => {
    setLeads(prev => prev.filter(l => l.id !== id));
    if (sel?.id === id) setSel(null);
    setToast('Lead eliminado');
    if (onLeadAdded) onLeadAdded(); // refresh parent stats
  };

  const handleAdded = newLead => {
    load();
    setToast(`"${newLead.nombre_compania}" agregado a leads`);
    if (onLeadAdded) onLeadAdded();
  };

  const exportCsv = async () => {
    setToast('Preparando CSV…');
    try {
      const r = await apiFetch('/api/leads/export/csv');
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'leads_corfo.csv'; a.click();
      URL.revokeObjectURL(url);
      setToast('CSV descargado');
    } catch { setToast('Error al exportar'); }
  };

  const total = leads.length;
  const byStatus = LEADS_STATUSES.reduce((acc, s) => {
    acc[s] = leads.filter(l => l.status === s).length;
    return acc;
  }, {});

  return (
    <div>
      {/* Stats row */}
      <div className="stat-row">
        <div className="stat-pill">
          <div className="val">{total}</div>
          <div className="lbl">Total leads</div>
        </div>
        {['Nuevo','Contactado','En seguimiento'].map(s => (
          <div key={s} className="stat-pill">
            <div className="val" style={{ color: s === 'Nuevo' ? 'var(--ink-400)' : s === 'Contactado' ? 'var(--data-3)' : 'var(--highlight)' }}>
              {byStatus[s] || 0}
            </div>
            <div className="lbl">{s}</div>
          </div>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16, alignItems: 'center' }}>
        {isAdmin && <button className="btn btn-primary btn-sm" onClick={() => setShowAddModal(true)}>+ Agregar lead</button>}
        {isAdmin && <button className="btn btn-ghost btn-sm" onClick={exportCsv} disabled={leads.length === 0}>Exportar CSV</button>}
        <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text-muted)' }}>
          {total} {total === 1 ? 'empresa' : 'empresas'}
        </span>
      </div>

      {/* Main layout: table + detail panel */}
      <div style={{ display: 'grid', gridTemplateColumns: sel ? '1fr 380px' : '1fr', gap: 16, alignItems: 'start' }}>
        {/* Table */}
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Nombre compañía</th>
                <th>Contacto</th>
                <th>Status</th>
              </tr></thead>
              <tbody>
                {loading ? (
                  <tr><td colSpan={3} style={{ textAlign:'center', padding:'32px 0', color:'var(--text-muted)' }}>
                    <div className="spinner" style={{ margin:'0 auto'}}/>
                  </td></tr>
                ) : error ? (
                  <tr><td colSpan={3} style={{ textAlign:'center', padding:'48px 0', color:'var(--red)' }}>
                    <p style={{ marginBottom: 10 }}>{error}</p>
                    <button className="btn btn-ghost btn-sm" onClick={load}>Reintentar</button>
                  </td></tr>
                ) : leads.length === 0 ? (
                  <tr><td colSpan={3} style={{ textAlign:'center', padding:'56px 0', color:'var(--text-muted)' }}>
                    <p style={{ fontSize: 14, marginBottom: 6 }}>No tienes leads todavía.</p>
                    <p style={{ fontSize: 12 }}>
                      Haz click en <strong>+ Agregar lead</strong> o busca empresas en{' '}
                      <strong>Consultas</strong> y usa el botón <strong>+ Leads</strong>.
                    </p>
                  </td></tr>
                ) : leads.map(l => (
                  <tr
                    key={l.id}
                    className={`leads-row${sel?.id === l.id ? ' selected' : ''}`}
                    onClick={() => setSel(l)}
                  >
                    <td style={{ fontWeight: 500 }}>{l.nombre_compania}</td>
                    <td style={{ color: l.contacto ? 'var(--text)' : 'var(--text-muted)', fontStyle: l.contacto ? 'normal' : 'italic' }}>
                      {l.contacto || 'Sin contacto'}
                    </td>
                    <td>
                      <span className={`badge ${STATUS_COLORS[l.status] || 'badge-gray'}`}>{l.status || 'Nuevo'}</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Detail panel */}
        {sel && (
          <LeadDetailPanel
            lead={sel}
            isAdmin={isAdmin}
            onClose={() => setSel(null)}
            onUpdate={handleUpdate}
            onDelete={handleDelete}
          />
        )}
      </div>

      {toast && <Toast msg={toast} onDone={() => setToast(null)}/>}
      {showAddModal && <AddLeadModal onClose={() => setShowAddModal(false)} onAdded={handleAdded}/>}
    </div>
  );
}

// ─── EXPLORADOR DE PROYECTOS ───────────────
const EXPLORADOR_DEFAULT_COLS = [
  'año_adjudicacion', 'razon', 'titulo_del_proyecto',
  'region_ejecucion', 'sector_economico', 'tipo_innovacion', 'aprobado_corfo',
];

const EXPLORADOR_ALL_COLS = [
  { key: 'año_adjudicacion',    label: 'Año' },
  { key: 'codigo',              label: 'Código' },
  { key: 'razon',               label: 'Empresa' },
  { key: 'titulo_del_proyecto', label: 'Título del proyecto' },
  { key: 'region_ejecucion',    label: 'Región' },
  { key: 'sector_economico',    label: 'Sector' },
  { key: 'tipo_innovacion',     label: 'Tipo innovación' },
  { key: 'tipo_proyecto',       label: 'Tipo proyecto' },
  { key: 'aprobado_corfo',      label: 'Monto CORFO' },
  { key: 'tendencia_final',     label: 'Tendencia' },
  { key: 'estado_data',         label: 'Estado' },
  { key: 'instrumento_homologado', label: 'Instrumento' },
  { key: 'tramo_ventas',        label: 'Tramo ventas' },
];

// Columnas que muestran texto largo y deben hacer wrap
const WRAP_COLS = new Set(['titulo_del_proyecto', 'objetivo_general_del_proyecto']);

function Explorador({ isAdmin }) {
  // ── Estado de filtros ───────────────────────────────────────────────────
  const [region, setRegion]         = useState('');
  const [sector, setSector]         = useState('');
  const [tipoInn, setTipoInn]       = useState('');
  const [tipoProy, setTipoProy]     = useState('');
  const [anio, setAnio]             = useState('');       // filtro por año exacto
  const [search, setSearch]         = useState('');
  const [montoMin, setMontoMin]     = useState('');
  const [montoMax, setMontoMax]     = useState('');

  // ── Estado de tabla ─────────────────────────────────────────────────────
  const [sortCol, setSortCol]       = useState('año_adjudicacion');
  const [sortDir, setSortDir]       = useState('desc');
  const [page, setPage]             = useState(1);
  const LIMIT = 50;

  // ── Datos ───────────────────────────────────────────────────────────────
  const [rows, setRows]             = useState([]);
  const [total, setTotal]           = useState(0);
  const [pages, setPages]           = useState(1);
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState(null);
  const [filterOptions, setFilterOptions] = useState(null);

  // ── UI ──────────────────────────────────────────────────────────────────
  const [visibleCols, setVisibleCols] = useState(new Set(EXPLORADOR_DEFAULT_COLS));
  const [colDropdown, setColDropdown] = useState(false);
  const [proyectoPanel, setProyectoPanel] = useState(null); // { codigo }
  const [toast, setToast]           = useState(null);
  const colDropdownRef              = useRef(null);

  // Cerrar dropdown de columnas al hacer clic afuera
  useEffect(() => {
    if (!colDropdown) return;
    const handler = (e) => {
      if (colDropdownRef.current && !colDropdownRef.current.contains(e.target)) {
        setColDropdown(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [colDropdown]);

  // Cargar opciones de filtro al montar
  useEffect(() => {
    fetch('/api/dashboard/filter-options')
      .then(r => r.json())
      .then(d => { if (!d.error) setFilterOptions(d); })
      .catch(() => {});
  }, []);

  // Construir query params y hacer fetch al backend
  const fetchData = useCallback(() => {
    const params = new URLSearchParams();
    params.set('page', String(page));
    params.set('limit', String(LIMIT));
    params.set('sort_col', sortCol);
    params.set('sort_dir', sortDir);
    if (region)   params.set('region', region);
    if (sector)   params.set('sector', sector);
    if (tipoInn)  params.set('tipo_innovacion', tipoInn);
    if (tipoProy) params.set('tipo_proyecto', tipoProy);
    if (anio)     { params.set('anio_min', anio); params.set('anio_max', anio); }
    if (montoMin) params.set('monto_min', montoMin);
    if (montoMax) params.set('monto_max', montoMax);
    if (search)   params.set('search', search);

    setLoading(true);
    setError(null);
    fetch(`/api/proyectos?${params.toString()}`)
      .then(r => r.json())
      .then(d => {
        if (d.error) { setError(d.error); return; }
        setRows(d.rows || []);
        setTotal(d.total || 0);
        setPages(d.pages || 1);
      })
      .catch(() => setError('Error de conexión con el servidor.'))
      .finally(() => setLoading(false));
  }, [page, sortCol, sortDir, region, sector, tipoInn, tipoProy, anio, montoMin, montoMax, search]);

  useEffect(() => { fetchData(); }, [fetchData]);

  // Cuando cambia un filtro, volver a la página 1
  const applyFilter = (setter) => (val) => { setter(val); setPage(1); };

  // Click en cabecera de columna
  const handleSort = (col) => {
    if (sortCol === col) {
      setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    } else {
      setSortCol(col);
      setSortDir('desc');
    }
    setPage(1);
  };

  // Limpiar todos los filtros
  const limpiarFiltros = () => {
    setRegion(''); setSector(''); setTipoInn(''); setTipoProy('');
    setAnio(''); setSearch(''); setMontoMin(''); setMontoMax('');
    setPage(1);
  };

  const hayFiltros = !!(region || sector || tipoInn || tipoProy || anio || search || montoMin || montoMax);

  // Chips activos — array de { key, label, clear }
  const chips = [];
  if (region)   chips.push({ key: 'region',   label: `Región: ${region}`,              clear: () => applyFilter(setRegion)('') });
  if (sector)   chips.push({ key: 'sector',   label: `Sector: ${sector.slice(0,40)}`,  clear: () => applyFilter(setSector)('') });
  if (tipoInn)  chips.push({ key: 'tipoInn',  label: `Innovación: ${tipoInn}`,         clear: () => applyFilter(setTipoInn)('') });
  if (tipoProy) chips.push({ key: 'tipoProy', label: `Tipo: ${tipoProy}`,              clear: () => applyFilter(setTipoProy)('') });
  if (anio)     chips.push({ key: 'anio',     label: `Año: ${anio}`,                   clear: () => applyFilter(setAnio)('') });
  if (montoMin) chips.push({ key: 'montoMin', label: `Monto ≥ ${fmtClp(montoMin)}`,   clear: () => applyFilter(setMontoMin)('') });
  if (montoMax) chips.push({ key: 'montoMax', label: `Monto ≤ ${fmtClp(montoMax)}`,   clear: () => applyFilter(setMontoMax)('') });
  if (search)   chips.push({ key: 'search',   label: `Buscar: "${search}"`,            clear: () => applyFilter(setSearch)('') });

  // Columnas visibles según selección del usuario (en orden original)
  const displayCols = EXPLORADOR_ALL_COLS.filter(c => visibleCols.has(c.key));

  // Exportar a Excel (solo admin) — usa los datos de la página actual
  const exportarExcel = async () => {
    if (!rows.length) return;
    setToast('Preparando Excel…');
    try {
      const r = await fetch('/api/export/excel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: rows, filename: 'proyectos_explorador' }),
      });
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'proyectos_explorador.xlsx'; a.click();
      URL.revokeObjectURL(url);
      setToast('Excel descargado');
    } catch { setToast('Error al exportar'); }
  };

  return (
    <div>
      {/* ── Barra de filtros ── */}
      <div className="explorador-filters">
        <label>
          Región
          <select value={region} onChange={e => applyFilter(setRegion)(e.target.value)}>
            <option value="">Todas las regiones</option>
            {(filterOptions?.regiones || []).map(r => <option key={r} value={r}>{r}</option>)}
          </select>
        </label>
        <label>
          Sector
          <select value={sector} onChange={e => applyFilter(setSector)(e.target.value)}>
            <option value="">Todos los sectores</option>
            {(filterOptions?.sectores || []).map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </label>
        <label>
          Tipo innovación
          <select value={tipoInn} onChange={e => applyFilter(setTipoInn)(e.target.value)}>
            <option value="">Todos</option>
            {(filterOptions?.tipos_innovacion || []).map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </label>
        <label>
          Tipo proyecto
          <select value={tipoProy} onChange={e => applyFilter(setTipoProy)(e.target.value)}>
            <option value="">Todos</option>
            {(filterOptions?.tipos_proyecto || []).map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </label>
        <label>
          Año
          <select value={anio} onChange={e => applyFilter(setAnio)(e.target.value)}>
            <option value="">Todos los años</option>
            {filterOptions
              ? Array.from(
                  { length: (filterOptions.año_max || 2025) - (filterOptions.año_min || 2009) + 1 },
                  (_, i) => (filterOptions.año_max || 2025) - i
                ).map(y => <option key={y} value={String(y)}>{y}</option>)
              : []}
          </select>
        </label>
        <label style={{ flex: 1, minWidth: 200 }}>
          Buscar empresa o proyecto...
          <input
            type="text"
            placeholder="Nombre de empresa o palabras del título…"
            value={search}
            onChange={e => applyFilter(setSearch)(e.target.value)}
          />
        </label>
        <label>
          Monto mín. (CLP)
          <input
            type="number"
            placeholder="0"
            value={montoMin}
            onChange={e => applyFilter(setMontoMin)(e.target.value)}
            min="0"
          />
        </label>
        <label>
          Monto máx. (CLP)
          <input
            type="number"
            placeholder="3.200.000.000"
            value={montoMax}
            onChange={e => applyFilter(setMontoMax)(e.target.value)}
            min="0"
          />
        </label>
        {hayFiltros && (
          <button className="btn btn-ghost btn-sm" onClick={limpiarFiltros} style={{ alignSelf: 'flex-end' }}>
            Limpiar filtros
          </button>
        )}
      </div>

      {/* ── Chips de filtros activos ── */}
      {chips.length > 0 && (
        <div className="explorador-chips">
          {chips.map(c => (
            <span key={c.key} className="explorador-chip">
              {c.label}
              <button onClick={c.clear} title="Quitar filtro">&#x2715;</button>
            </span>
          ))}
        </div>
      )}

      {/* ── Toolbar: total, columnas, exportar ── */}
      <div className="table-toolbar" style={{ marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>
          {loading ? 'Cargando…' : `${total.toLocaleString('es-CL')} proyectos en total · página ${page} de ${pages}`}
        </span>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {/* Selector de columnas */}
          <div className="col-toggle-wrap" ref={colDropdownRef}>
            <button className="btn btn-ghost btn-sm" onClick={() => setColDropdown(v => !v)}>
              Columnas ({visibleCols.size}) ▾
            </button>
            {colDropdown && (
              <div className="col-toggle-dropdown">
                {EXPLORADOR_ALL_COLS.map(c => (
                  <label key={c.key} className={`col-toggle-item${visibleCols.has(c.key) ? ' checked' : ''}`}>
                    <input
                      type="checkbox"
                      checked={visibleCols.has(c.key)}
                      onChange={() => setVisibleCols(prev => {
                        const next = new Set(prev);
                        if (next.has(c.key)) next.delete(c.key); else next.add(c.key);
                        return next;
                      })}
                    />
                    {c.label}
                  </label>
                ))}
              </div>
            )}
          </div>
          {isAdmin && rows.length > 0 && (
            <button className="btn btn-ghost btn-sm" onClick={exportarExcel}>
              Exportar Excel
            </button>
          )}
        </div>
      </div>

      {/* ── Tabla ── */}
      {error && (
        <div style={{ background:'#F3E3DF', border:'1px solid rgba(155,61,46,.25)', borderRadius:'var(--r-3)', padding:'var(--s-3) var(--s-4)', color:'var(--neg)', fontSize:'var(--fs-13)' }}>
          {error}
        </div>
      )}

      {!error && (
        <div className="table-wrap exp-table" style={{ maxHeight: 520 }}>
          {loading && rows.length === 0 ? (
            <div className="spinner" style={{ margin: '48px auto' }}/>
          ) : rows.length === 0 ? (
            <div className="empty"><p>Sin resultados para los filtros seleccionados</p></div>
          ) : (
            <table>
              <thead>
                <tr>
                  {displayCols.map(c => {
                    const isActive = sortCol === c.key;
                    return (
                      <th
                        key={c.key}
                        className={`sortable${isActive ? ' sort-active' : ''}`}
                        onClick={() => handleSort(c.key)}
                      >
                        {c.label}
                        <span className="sort-arrow">
                          {isActive ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ' ⇅'}
                        </span>
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {rows.map((row) => (
                  <tr
                    key={row.codigo}
                    className="clickable-row"
                    onClick={() => setProyectoPanel({ codigo: row.codigo })}
                    title="Ver detalle del proyecto"
                  >
                    {displayCols.map(c => {
                      const v = row[c.key];
                      let display;
                      if (v == null) display = '—';
                      else if (c.key === 'aprobado_corfo') display = fmtClp(Number(v));
                      else display = String(v);
                      return (
                        <td
                          key={c.key}
                          className={WRAP_COLS.has(c.key) ? 'wrap-col' : ''}
                          title={v != null && !WRAP_COLS.has(c.key) ? String(v) : undefined}
                        >
                          {display}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ── Paginación ── */}
      {!error && pages > 1 && (
        <div className="paginacion">
          <div className="pag-btns">
            <button
              className="btn btn-ghost btn-sm"
              disabled={page <= 1 || loading}
              onClick={() => setPage(p => Math.max(1, p - 1))}
            >
              Anterior
            </button>
            <button
              className="btn btn-ghost btn-sm"
              disabled={page >= pages || loading}
              onClick={() => setPage(p => Math.min(pages, p + 1))}
            >
              Siguiente
            </button>
          </div>
          <span>Página {page} de {pages} · {LIMIT} por página</span>
        </div>
      )}

      {/* ── Panel de detalle de proyecto ── */}
      {proyectoPanel && (
        <ProyectoDetallePanel
          codigo={proyectoPanel.codigo}
          onClose={() => setProyectoPanel(null)}
          isAdmin={isAdmin}
        />
      )}

      {toast && <Toast msg={toast} onDone={() => setToast(null)}/>}
    </div>
  );
}

// ─── LOGIN FORM ────────────────────────────
function LoginForm({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const d = await r.json();
      if (r.ok && d.ok) {
        onLogin(username);
      } else {
        setError(d.error || 'Error al iniciar sesión');
      }
    } catch {
      setError('No se pudo conectar con el servidor');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="login-overlay">
      <div className="login-card">
        <div className="login-logo">
          <h1>CORFO</h1>
          <p>Innovación</p>
        </div>
        {error && <div className="login-error">{error}</div>}
        <form onSubmit={handleSubmit}>
          <div className="login-field">
            <label>Usuario</label>
            <input
              type="text"
              value={username}
              onChange={e => setUsername(e.target.value)}
              placeholder="Nombre de usuario"
              autoComplete="username"
              autoFocus
            />
          </div>
          <div className="login-field">
            <label>Contraseña</label>
            <input
              type="password"
              value={password}
              onChange={e => setPassword(e.target.value)}
              placeholder="Contraseña"
              autoComplete="current-password"
            />
          </div>
          <button
            type="submit"
            className="btn btn-primary"
            style={{ width: '100%', marginTop: 'var(--s-2)', padding: '10px', justifyContent: 'center' }}
            disabled={loading || !username || !password}
          >
            {loading ? 'Verificando…' : 'Iniciar sesión'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── ROOT APP ──────────────────────────────
function App() {
  const [tab, setTab] = useState('consultas');
  const [stats, setStats] = useState({ total:0, contacted:0, pending:0 });
  const [lastQuery, setLastQuery] = useState(null);
  const [leadsRefreshKey, setLeadsRefreshKey] = useState(0);
  // Consulta pendiente desde el Dashboard: { question, origin } | null
  const [pendingQuery, setPendingQuery] = useState(null);

  // Estado de autenticación: null = verificando, false = no autenticado, {username, role} = autenticado
  const [authUser, setAuthUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  // Handler que recibe { question, origin } desde el Dashboard y lleva al usuario a Consultas
  // Definido antes de los returns condicionales para cumplir las reglas de hooks
  const handleDrillToConsultas = useCallback(({ question, origin }) => {
    setPendingQuery({ question, origin });
    setTab('consultas');
  }, []);

  // Verificar sesión activa al cargar la app
  useEffect(() => {
    fetch('/api/auth/me')
      .then(r => r.json())
      .then(d => {
        if (d.authenticated) {
          setAuthUser({ username: d.username, role: d.role || 'viewer' });
        } else {
          setAuthUser(false);
        }
      })
      .catch(() => setAuthUser(false))
      .finally(() => setAuthChecked(true));
  }, []);

  useEffect(() => {
    if (authUser) {
      fetch('/api/leads/stats').then(r => r.json()).then(setStats).catch(console.error);
    }
  }, [authUser]);

  // Refresh stats pill counts and signal Leads tab to re-fetch its list
  const refreshStats = useCallback(() => {
    fetch('/api/leads/stats').then(r => r.json()).then(setStats).catch(console.error);
    setLeadsRefreshKey(k => k + 1);
  }, []);

  const handleLogin = async (username) => {
    try {
      const r = await fetch('/api/auth/me');
      const d = await r.json();
      if (d.authenticated) {
        setAuthUser({ username: d.username, role: d.role || 'viewer' });
      } else {
        setAuthUser({ username, role: 'viewer' });
      }
    } catch {
      setAuthUser({ username, role: 'viewer' });
    }
  };

  const handleLogout = async () => {
    try {
      await fetch('/api/auth/logout', { method: 'POST' });
    } catch {
      // ignorar errores de red — igual limpiar estado local
    }
    setAuthUser(false);
  };

  // Mostrar nada mientras se verifica la sesión inicial
  if (!authChecked) {
    return null;
  }

  // Mostrar formulario de login si no está autenticado
  if (!authUser) {
    return <LoginForm onLogin={handleLogin} />;
  }

  const nav = [
    { id:'consultas',  icon:'💬', label:'Consultas' },
    { id:'dashboard',  icon:'📊', label:'Dashboard' },
    { id:'explorar',   icon:'🔍', label:'Explorar' },
    { id:'leads',      icon:'🏢', label:'Leads' }
  ];

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>Gungnir<em>·</em></h1>
          <p>CORFO · Innovación</p>
        </div>
        <nav className="nav">
          {nav.map(n => (
            <div key={n.id} className={`nav-item${tab===n.id?' active':''}`} onClick={() => setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div>
            <div style={{ fontSize: 'var(--fs-13)', color: 'var(--ink-700)', fontWeight: 500 }}>{authUser?.username}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--s-2)', marginTop: 2 }}>
              <span style={{
                fontFamily: 'var(--font-mono)',
                fontSize: 9, fontWeight: 500,
                padding: '1px 6px', borderRadius: 'var(--r-1)',
                textTransform: 'uppercase', letterSpacing: '0.10em',
                background: authUser?.role === 'admin' ? 'var(--accent-dim)' : 'var(--ink-100)',
                color: authUser?.role === 'admin' ? 'var(--accent)' : 'var(--ink-400)',
              }}>{authUser?.role || 'viewer'}</span>
            </div>
          </div>
          <button className="btn-logout" onClick={handleLogout} title="Cerrar sesión">
            Cerrar sesión
          </button>
        </div>
      </aside>

      <main className="main">
        <div style={{display: tab==='consultas' ? '' : 'none'}}><Consultas onQueryResult={setLastQuery} onLeadAdded={refreshStats} isAdmin={authUser?.role === 'admin'} pendingQuery={pendingQuery} onClearPendingQuery={() => setPendingQuery(null)} username={authUser?.username}/></div>
        <div style={{display: tab==='dashboard' ? '' : 'none'}}><Dashboard lastQuery={lastQuery} onDrillToConsultas={handleDrillToConsultas}/></div>
        <div style={{display: tab==='explorar'  ? '' : 'none'}}><Explorador isAdmin={authUser?.role === 'admin'}/></div>
        <div style={{display: tab==='leads'     ? '' : 'none'}}><Leads refreshKey={leadsRefreshKey} onLeadAdded={refreshStats} isAdmin={authUser?.role === 'admin'}/></div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
